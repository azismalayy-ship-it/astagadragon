<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Bella 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
text-align:center;
}

.container{
animation:fadeIn 2s ease;
}

h1{
font-size:40px;
margin-bottom:10px;
}

p{
opacity:.9;
margin-bottom:20px;
}

img{
width:220px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
margin-bottom:20px;
}

button{
padding:14px 30px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
background:white;
color:#ff4b6e;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

.surprise{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#000000dd;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
pointer-events:none;
transition:.6s;
}

.surprise.show{
opacity:1;
pointer-events:auto;
}

.big{
font-size:50px;
animation:pop 1s infinite alternate;
}

@keyframes pop{
from{transform:scale(1)}
to{transform:scale(1.1)}
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(30px)}
to{opacity:1; transform:translateY(0)}
}

/* confetti */
.confetti{
position:absolute;
width:8px;
height:8px;
background:white;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(360deg);
}
}
</style>
</head>

<body>

<div class="container">
<h1>🎉 Happy Birthday Bella Aidha 🎉</h1>

<img src="bella.jpg">

<p>Semoga hari kamu penuh kebahagiaan ❤️</p>

<button onclick="startSurprise()">🎁 Surprise</button>
</div>

<div class="surprise" id="surprise">
<div class="big">🎂 SELAMAT ULANG TAHUN 🎂</div>
<p>Aku selalu doakan yang terbaik buat kamu 💖</p>
</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

const music = document.getElementById("music");

function startSurprise(){

// tampilkan surprise
document.getElementById("surprise").classList.add("show");

// play music (browser modern butuh klik tombol)
music.play();

// confetti ultra mode
for(let i=0;i<80;i++){
createConfetti();
}
}

function createConfetti(){
const conf = document.createElement("div");
conf.classList.add("confetti");

conf.style.left=Math.random()*100+"vw";
conf.style.animationDuration=(Math.random()*3+2)+"s";
conf.style.opacity=Math.random();

document.body.appendChild(conf);

setTimeout(()=>conf.remove(),5000);
}

</script>

</body>
</html>
